<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Interview Agent — Knowledge Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07101f;color:#e2e8f0;font-family:'Segoe UI',Arial,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOP BAR */
#topbar{height:52px;background:#0a1628;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;z-index:10;}
#topbar h1{font-size:15px;font-weight:700;color:#60a5fa;white-space:nowrap;}
#topbar .sub{font-size:11px;color:#334155;}
#search{padding:6px 12px;background:#0f1e38;border:1px solid #1e3a5f;border-radius:7px;color:#e2e8f0;font-size:12px;outline:none;width:220px;}
#search:focus{border-color:#3b82f6;}
#search::placeholder{color:#334155;}
.fbtn{padding:4px 10px;border-radius:5px;border:1.5px solid transparent;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.04);transition:all .15s;white-space:nowrap;}
.fbtn.on{opacity:1;}
.fbtn.off{opacity:.3;}
#hint{margin-left:auto;font-size:11px;color:#334155;white-space:nowrap;}

/* MAIN LAYOUT */
#body{flex:1;display:flex;overflow:hidden;}

/* GRAPH AREA */
#graph{flex:1;overflow:hidden;position:relative;}
#graph svg{width:100%;height:100%;}

/* INFO PANEL */
#panel{width:340px;background:#090f1e;border-left:1px solid #1e3a5f;overflow-y:auto;padding:18px;flex-shrink:0;}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px;}
.ph{color:#334155;text-align:center;padding-top:60px;font-size:13px;line-height:1.8;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;}
.ptitle{font-size:17px;font-weight:700;margin-bottom:4px;}
.pfile{font-size:10.5px;color:#334155;font-family:monospace;margin-bottom:12px;}
.pdesc{font-size:12.5px;color:#94a3b8;line-height:1.7;margin-bottom:14px;}
.psec{font-size:10px;font-weight:700;color:#475569;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;margin-top:14px;}
.pfn{background:#0f1e38;border:1px solid #1e3a5f;border-radius:7px;padding:9px 11px;margin-bottom:6px;}
.pfnname{font-family:monospace;font-size:11.5px;color:#60a5fa;margin-bottom:3px;}
.pfndesc{font-size:11px;color:#94a3b8;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:3px 8px;border-radius:5px;font-size:10.5px;font-family:monospace;background:#0f1e38;border:1px solid #1e3a5f;color:#93c5fd;cursor:pointer;transition:all .12s;}
.chip:hover{background:#1e3a5f;color:#fff;}
.div{height:1px;background:#1e3a5f;margin:12px 0;}

/* LEGEND */
#legend{position:absolute;left:12px;bottom:12px;background:rgba(7,16,31,.9);border:1px solid #1e3a5f;border-radius:9px;padding:10px 13px;}
.lrow{display:flex;align-items:center;gap:7px;font-size:11px;color:#94a3b8;margin-bottom:4px;}
.lrow:last-child{margin-bottom:0;}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* NODES */
.node-circle{cursor:pointer;transition:all .18s;}
.node-circle:hover{filter:brightness(1.4);}
.node-label{pointer-events:none;font-size:10px;fill:#cbd5e1;font-weight:600;}
.node-abbr{pointer-events:none;font-weight:800;text-anchor:middle;dominant-baseline:middle;}
.edge{fill:none;stroke-opacity:.4;}
</style>
</head>
<body>

<div id="topbar">
  <h1>🧠 Interview Agent</h1>
  <span class="sub">Knowledge Graph</span>
  <input id="search" placeholder="Search files…" oninput="onSearch(this.value)"/>
  <div id="filterbtns" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
  <span id="hint">Click a node to inspect · Drag to pan · Scroll to zoom</span>
</div>

<div id="body">
  <div id="graph">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="legend"></div>
  </div>
  <div id="panel"><div class="ph">👆 Click any node<br>to explore it</div></div>
</div>

  {s:"report_generator",t:"model_interview", c:"#3b82f6"},{s:"report_generator",t:"model_report",   c:"#3b82f6"},
  {s:"report_generator",t:"model_candidate", c:"#3b82f6"},

  {s:"recovery_svc",t:"evaluation_engine",c:"#f97316"},{s:"recovery_svc",t:"report_generator",c:"#f97316"},
  {s:"recovery_svc",t:"model_interview",  c:"#3b82f6"},
  {s:"scheduler",   t:"recovery_svc",     c:"#f97316"},

  {s:"agent",t:"interview_graph",  c:"#ef4444"},{s:"agent",t:"avatar_session",   c:"#ef4444"},
  {s:"agent",t:"model_interview",  c:"#3b82f6"},{s:"agent",t:"evaluation_engine",c:"#f97316"},
];

// ═══════════════════════════════════════════════════════════════
// LAYOUT — assign fixed positions in a layered grid
// ═══════════════════════════════════════════════════════════════

const LAYOUT = {
  // entry
  main: {lx:.5, ly:.05},
  // core
  config:{lx:.1,ly:.17}, middleware:{lx:.28,ly:.17}, security:{lx:.46,ly:.17},
  rate_limiter:{lx:.64,ly:.17}, logging_config:{lx:.82,ly:.17},
  // db
  db_session:{lx:.05,ly:.33}, model_base:{lx:.2,ly:.33}, model_candidate:{lx:.35,ly:.33},
  model_job:{lx:.48,ly:.33}, model_ats:{lx:.61,ly:.33}, model_interview:{lx:.75,ly:.33}, model_report:{lx:.9,ly:.33},
  // services
  resume_extractor:{lx:.05,ly:.50}, ats_extractor:{lx:.19,ly:.50}, strategy_builder:{lx:.33,ly:.50},
  context_builder:{lx:.47,ly:.50}, email_service:{lx:.61,ly:.50},
  evaluation_engine:{lx:.73,ly:.50}, report_generator:{lx:.86,ly:.50}, recovery_svc:{lx:.96,ly:.50},
  // workers
  scheduler:{lx:.96,ly:.65},
  // realtime
  room_manager:{lx:.14,ly:.65}, interview_graph:{lx:.32,ly:.65},
  agent:{lx:.52,ly:.65}, avatar_session:{lx:.70,ly:.65},
  // routes
  interviews_r:{lx:.1,ly:.82}, session_r:{lx:.27,ly:.82}, evaluation_r:{lx:.44,ly:.82},
  reports_r:{lx:.61,ly:.82}, recovery_r:{lx:.78,ly:.82},
};

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

const svg    = document.getElementById("svg");
const NS     = "http://www.w3.org/2000/svg";
let W = 0, H = 0;
let pan = {x:0,y:0}, zoom = 1;
let dragging = false, dragStart = null, panStart = null;
let selectedId = null;

const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

function gw(){return document.getElementById("graph").clientWidth;}
function gh(){return document.getElementById("graph").clientHeight;}

function px(n){ return LAYOUT[n.id].lx * W; }
function py(n){ return LAYOUT[n.id].ly * H; }

function build(){
  W = gw(); H = gh();
  svg.innerHTML = "";
  svg.setAttribute("viewBox","0 0 "+W+" "+H);

  const defs = el("defs"); svg.appendChild(defs);
  // Arrow markers
  const colors = [...new Set(EDGES.map(e=>e.c))];
  colors.forEach(c=>{
    const m = el("marker");
    m.setAttribute("id","arr"+c.replace("#",""));
    m.setAttribute("viewBox","0 -3 7 6");
    m.setAttribute("refX","12"); m.setAttribute("refY","0");
    m.setAttribute("markerWidth","5"); m.setAttribute("markerHeight","5");
    m.setAttribute("orient","auto");
    const p = el("path"); p.setAttribute("d","M0,-3L7,0L0,3");
    p.setAttribute("fill",c); p.setAttribute("opacity",".7");
    m.appendChild(p); defs.appendChild(m);
  });

  const gRoot = el("g"); gRoot.id = "groot"; svg.appendChild(gRoot);

  // Edges
  const edgeGroup = el("g"); gRoot.appendChild(edgeGroup);
  EDGES.forEach(e=>{
    const s = nodeMap[e.s], t = nodeMap[e.t];
    if(!s||!t) return;
    const x1=px(s),y1=py(s),x2=px(t),y2=py(t);
    const dx=x2-x1, dy=y2-y1;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    // Curved path
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const cx=mx-dy*.18, cy=my+dx*.18;
    const path = el("path");
    path.setAttribute("d",`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
    path.setAttribute("stroke",e.c);
    path.setAttribute("stroke-width","1.4");
    path.setAttribute("stroke-opacity",".35");
    path.setAttribute("fill","none");
    path.setAttribute("marker-end","url(#arr"+e.c.replace("#","")+")");
    path.dataset.s = e.s; path.dataset.t = e.t;
    path.classList.add("edge");
    edgeGroup.appendChild(path);
  });

  // Nodes
  const nodeGroup = el("g"); gRoot.appendChild(nodeGroup);
  NODES.forEach(n=>{
    const x=px(n), y=py(n), r=n.r;
    const c=LAYERS[n.layer].color;
    const g = el("g"); g.classList.add("node-g"); g.dataset.id = n.id;
    g.style.cursor = "pointer";

    // Glow
    const glow = el("circle");
    glow.setAttribute("cx",x); glow.setAttribute("cy",y); glow.setAttribute("r",r+10);
    glow.setAttribute("fill",c); glow.setAttribute("opacity",".07");
    g.appendChild(glow);

    // Circle
    const circ = el("circle");
    circ.setAttribute("cx",x); circ.setAttribute("cy",y); circ.setAttribute("r",r);
    circ.setAttribute("fill",c+"1a");
    circ.setAttribute("stroke",c);
    circ.setAttribute("stroke-width", r>18?"2.5":"1.8");
    circ.classList.add("node-circle");
    g.appendChild(circ);

    // Abbr text inside
    const abbr = el("text");
    abbr.setAttribute("x",x); abbr.setAttribute("y",y);
    abbr.setAttribute("text-anchor","middle"); abbr.setAttribute("dominant-baseline","middle");
    abbr.setAttribute("font-size", r>18?"11":"9");
    abbr.setAttribute("fill",c); abbr.setAttribute("font-weight","800");
    abbr.textContent = n.label.split("/").pop().split(".")[0].slice(0,3).toUpperCase();
    g.appendChild(abbr);

    // Label below
    const lbl = el("text");
    lbl.setAttribute("x",x); lbl.setAttribute("y",y+r+12);
    lbl.setAttribute("text-anchor","middle");
    lbl.setAttribute("font-size", r>18?"10":"9");
    lbl.setAttribute("fill","#94a3b8");
    lbl.setAttribute("font-weight","600");
    lbl.textContent = n.label.length>18 ? n.label.slice(0,16)+"…" : n.label;
    g.appendChild(lbl);

    g.addEventListener("click", ()=>selectNode(n.id));
    g.addEventListener("mouseenter", ()=>{ if(glow.getAttribute("opacity")!==".25") glow.setAttribute("opacity",".18"); });
    g.addEventListener("mouseleave", ()=>{ if(glow.getAttribute("opacity")!==".25") glow.setAttribute("opacity",".07"); });

    nodeGroup.appendChild(g);
  });

  // Pan/zoom
  svg.addEventListener("wheel", onWheel, {passive:false});
  svg.addEventListener("mousedown", onMD);
  svg.addEventListener("mousemove", onMM);
  svg.addEventListener("mouseup",   onMU);
  svg.addEventListener("click", e=>{ if(e.target===svg) clearSel(); });

  applyTransform();
}

function el(tag){ return document.createElementNS(NS,tag); }
function applyTransform(){
  const g = document.getElementById("groot");
  if(g) g.setAttribute("transform",`translate(${pan.x},${pan.y}) scale(${zoom})`);
}

// ── PAN / ZOOM ────────────────────────────────────────────────
function onWheel(e){
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1.1 : .91;
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  pan.x = mx - (mx - pan.x)*delta;
  pan.y = my - (my - pan.y)*delta;
  zoom = Math.max(.25, Math.min(4, zoom*delta));
  applyTransform();
}
function onMD(e){
  if(e.button!==0) return;
  dragging=true; dragStart={x:e.clientX,y:e.clientY}; panStart={x:pan.x,y:pan.y};
}
function onMM(e){
  if(!dragging) return;
  pan.x = panStart.x + (e.clientX-dragStart.x);
  pan.y = panStart.y + (e.clientY-dragStart.y);
  applyTransform();
}
function onMU(){ dragging=false; }

// ── SELECT ────────────────────────────────────────────────────

function selectNode(id){
  selectedId = id;
  const connIds = new Set([id]);
  EDGES.forEach(e=>{ if(e.s===id) connIds.add(e.t); if(e.t===id) connIds.add(e.s); });

  document.querySelectorAll(".node-g").forEach(g=>{
    const nid = g.dataset.id;
    const circ = g.querySelector("circle:not(:first-child)") || g.querySelectorAll("circle")[1];
    const glowEl = g.querySelectorAll("circle")[0];
    if(connIds.has(nid)){
      g.style.opacity="1";
      glowEl.setAttribute("opacity",nid===id?".35":".12");
    } else {
      g.style.opacity=".18";
      glowEl.setAttribute("opacity",".04");
    }
  });

  document.querySelectorAll(".edge").forEach(p=>{
    const s=p.dataset.s, t=p.dataset.t;
    if(s===id||t===id){ p.setAttribute("stroke-opacity",".9"); p.setAttribute("stroke-width","2.2"); }
    else { p.setAttribute("stroke-opacity",".06"); p.setAttribute("stroke-width","1"); }
  });

  renderPanel(id, connIds);
}

function clearSel(){
  selectedId=null;
  document.querySelectorAll(".node-g").forEach(g=>{
    g.style.opacity="1";
    g.querySelectorAll("circle")[0].setAttribute("opacity",".07");
  });
  document.querySelectorAll(".edge").forEach(p=>{
    p.setAttribute("stroke-opacity",".35"); p.setAttribute("stroke-width","1.4");
  });
  document.getElementById("panel").innerHTML='<div class="ph">👆 Click any node<br>to explore it</div>';
}

// ── PANEL ─────────────────────────────────────────────────────

function renderPanel(id, connIds){
  const n = nodeMap[id];
  const c = LAYERS[n.layer].color;
  const into=[], outof=[];
  EDGES.forEach(e=>{
    if(e.s===id && e.t!==id) outof.push({id:e.t,c:e.c});
    if(e.t===id && e.s!==id) into.push({id:e.s,c:e.c});
  });

  const chipHtml = arr => arr.map(x=>`<span class="chip" onclick="selectNode('${x.id}')" style="border-color:${x.c}55;color:${x.c}">${nodeMap[x.id]?.label||x.id}</span>`).join("");
  const fnHtml = (n.fns||[]).map(f=>`<div class="pfn"><div class="pfnname">${f.n}</div><div class="pfndesc">${f.d}</div></div>`).join("");

  document.getElementById("panel").innerHTML = `
    <span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${LAYERS[n.layer].label.toUpperCase()}</span>
    <div class="ptitle" style="color:${c}">${n.label}</div>
    <div class="pfile">app/${n.id}.py</div>
    <div class="pdesc">${n.desc}</div>
    ${fnHtml ? `<div class="div"></div><div class="psec">Key Functions</div>${fnHtml}` : ""}
    ${into.length ? `<div class="div"></div><div class="psec">Used by</div><div class="chips">${chipHtml(into)}</div>` : ""}
    ${outof.length ? `<div class="div"></div><div class="psec">Depends on</div><div class="chips">${chipHtml(outof)}</div>` : ""}
  `;
}

// ── FILTER BUTTONS ────────────────────────────────────────────

const hiddenLayers = new Set();
const fbContainer = document.getElementById("filterbtns");

Object.entries(LAYERS).forEach(([key,val])=>{
  const b = document.createElement("button");
  b.className="fbtn on"; b.textContent=val.label;
  b.style.color=val.color; b.style.borderColor=val.color+"44";
  b.addEventListener("click",()=>{
    if(hiddenLayers.has(key)){
      hiddenLayers.delete(key); b.className="fbtn on"; b.style.opacity="1";
    } else {
      hiddenLayers.add(key); b.className="fbtn off"; b.style.opacity=".35";
    }
    document.querySelectorAll(".node-g").forEach(g=>{
      const nid=g.dataset.id, n=nodeMap[nid];
      if(n) g.style.display = hiddenLayers.has(n.layer)?"none":"";
    });
    document.querySelectorAll(".edge").forEach(p=>{
      const s=nodeMap[p.dataset.s], t=nodeMap[p.dataset.t];
      if(!s||!t) return;
      p.style.display = hiddenLayers.has(s.layer)||hiddenLayers.has(t.layer)?"none":"";
    });
  });
  fbContainer.appendChild(b);
});

// ── SEARCH ────────────────────────────────────────────────────

function onSearch(q){
  q = q.toLowerCase().trim();
  if(!q){
    document.querySelectorAll(".node-g").forEach(g=>g.style.opacity="1");
    document.querySelectorAll(".edge").forEach(p=>{ p.setAttribute("stroke-opacity",".35"); p.setAttribute("stroke-width","1.4"); });
    return;
  }
  const matched = new Set(NODES.filter(n=>n.label.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q)).map(n=>n.id));
  document.querySelectorAll(".node-g").forEach(g=>{
    g.style.opacity = matched.has(g.dataset.id)?"1":".12";
  });
  document.querySelectorAll(".edge").forEach(p=>{
    const ok = matched.has(p.dataset.s)||matched.has(p.dataset.t);
    p.setAttribute("stroke-opacity", ok?".7":".05");
    p.setAttribute("stroke-width", ok?"2":"1");
  });
  if(matched.size===1) renderPanel([...matched][0], matched);
}

// ── LEGEND ────────────────────────────────────────────────────

const lgd = document.getElementById("legend");
lgd.innerHTML = Object.values(LAYERS).map(l=>`
  <div class="lrow"><div class="ldot" style="background:${l.color}"></div>${l.label}</div>`).join("");

// ── FLOW GUIDE ────────────────────────────────────────────────
// Show a simple text guide at bottom of panel on first load

// ── INIT ─────────────────────────────────────────────────────

build();
window.addEventListener("resize", ()=>{ build(); if(selectedId) selectNode(selectedId); });
</script>
</body>
